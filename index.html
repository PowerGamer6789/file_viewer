<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Viewer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            overflow: hidden;
        }

        /* Initial Menu Setup */
        #container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: #1a1a1a;
            margin-bottom: 1.5rem;
            letter-spacing: -0.5px;
        }

        .upload-trigger {
            padding: 14px 28px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .upload-trigger:hover {
            opacity: 0.8;
        }

        /* The Viewer Frame */
        #viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            display: none;
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="container">
        <h1>File Viewer</h1>
        <input type="file" id="fileInput" accept=".html" style="display: none;">
        <button class="upload-trigger" onclick="document.getElementById('fileInput').click()">
            Open HTML File
        </button>
    </div>

    <iframe id="viewer"></iframe>

    <script>
        const fileInput = document.getElementById('fileInput');
        const viewer = document.getElementById('viewer');
        const container = document.getElementById('container');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function(event) {
                // Completely remove the upload UI from the DOM
                container.remove();
                
                // Show the viewer and inject the content
                viewer.style.display = 'block';
                
                // Inject the file content
                viewer.srcdoc = event.target.result;
            };

            reader.readAsText(file);
        });
    </script>
</body>
</html>
